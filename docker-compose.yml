name: ${COMPOSE_PROJECT_NAME}

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME}_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.8.3-php8.2-apache
    container_name: ${COMPOSE_PROJECT_NAME}_wordpress
    restart: unless-stopped
    depends_on:
      - db
      - mailpit
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      PCP_FORM_RECIPIENT: ${PCP_FORM_RECIPIENT}
      PCP_MAIL_BRAKE: ${PCP_MAIL_BRAKE}
      SMTP_ENABLED: ${SMTP_ENABLED}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        if ( ! defined( 'WP_DEBUG' ) ) {
          define( 'WP_DEBUG', true );
        }
        if ( ! defined( 'WP_DEBUG_LOG' ) ) {
          define( 'WP_DEBUG_LOG', true );
        }
        if ( ! defined( 'SCRIPT_DEBUG' ) ) {
          define( 'SCRIPT_DEBUG', false );
        }
        if ( ! defined( 'WP_ENVIRONMENT_TYPE' ) ) {
          define( 'WP_ENVIRONMENT_TYPE', 'local' );
        }
        if ( ! defined( 'DISALLOW_FILE_EDIT' ) ) {
          define( 'DISALLOW_FILE_EDIT', true );
        }
        if ( ! defined( 'DISABLE_WP_CRON' ) ) {
          define( 'DISABLE_WP_CRON', true );
        }
        if ( ! defined( 'FS_METHOD' ) ) {
          define( 'FS_METHOD', 'direct' );
        }
    volumes:
      - wordpress_data:/var/www/html
      - ./theme/plan-ceramique-premium:/var/www/html/wp-content/themes/plan-ceramique-premium
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(file_exists(\"/var/www/html/wp-load.php\") ? 0 : 1);'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mailpit
    restart: unless-stopped
    ports:
      - "8026:8025"

  wpcli:
    image: wordpress:cli-php8.2
    container_name: ${COMPOSE_PROJECT_NAME}_wpcli
    user: "33:33"
    depends_on:
      - wordpress
    environment:
      HOME: /tmp
      WP_CLI_CACHE_DIR: /tmp/.wp-cli/cache
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_SITE_URL: ${WORDPRESS_SITE_URL}
      WORDPRESS_SITE_TITLE: ${WORDPRESS_SITE_TITLE}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
      WORDPRESS_LANGUAGE: ${WORDPRESS_LANGUAGE}
      VISIBLE_CONTACT_EMAIL: ${VISIBLE_CONTACT_EMAIL}
      PCP_FORM_RECIPIENT: ${PCP_FORM_RECIPIENT}
      SERVICE_AREA_TEXT: ${SERVICE_AREA_TEXT}
      SMTP_ENABLED: ${SMTP_ENABLED}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    working_dir: /var/www/html
    volumes:
      - wordpress_data:/var/www/html
      - ./theme/plan-ceramique-premium:/var/www/html/wp-content/themes/plan-ceramique-premium
      - ./scripts:/workspace/scripts
    entrypoint: ["sh", "/workspace/scripts/bootstrap.sh"]
    profiles:
      - tools

volumes:
  db_data:
  wordpress_data:
